  http: ^1.6.0
  workmanager: ^0.9.0+3
  flutter_local_notifications: ^21.0.0
  file_picker: ^8.1.0
  csv: ^6.0.0
  webview_flutter: ^4.8.0
  local_auth: ^2.3.0
  pdf: ^3.11.1
  share_plus: ^10.0.2
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  isar_generator: ^3.1.0+1
